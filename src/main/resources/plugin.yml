name: VtAlters
version: '1.1'
main: com.vtalters.VtAlters
api-version: '1.17'
author: thangks
description: Plugin para invocar jefes mediante altares rituales usando MythicMobs. Soporta items personalizados de Nexo.
depend: [MythicMobs]
softdepend: [Nexo]
commands:
  vtalters:
    description: Comando principal del plugin VtAlters.
    usage: /<command> [subcomando]
    aliases: [altar, vta]
permissions:
  vtalters.admin:
    description: Concede acceso a todos los comandos de VtAlters.
    default: op
    children:
      vtalters.command.create: true
      vtalters.command.delete: true
      vtalters.command.list: true
      vtalters.command.wand: true
      vtalters.command.reload: true
      vtalters.command.edit: true
  vtalters.command.create:
    description: Permite crear nuevos altares.
    default: op
  vtalters.command.delete:
    description: Permite eliminar altares.
    default: op
  vtalters.command.list:
    description: Permite listar todos los altares.
    default: op
  vtalters.command.wand:
    description: Permite obtener la varita de configuracion.
    default: op
  vtalters.command.reload:
    description: Permite recargar el plugin.
    default: op
  vtalters.command.edit:
    description: Permite editar altares.
    default: op
